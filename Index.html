<body>

<div class="container">
  <div>
    <div class="title">Code Scanner</div>
    <div class="subtitle">Point camera at your code</div>
  </div>

  <div class="scanner-wrap" id="scannerWrap">
    <div class="scanner-box" id="scannerBox">

      <!-- Default state: no camera -->
      <div class="camera-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>Camera inactive</p>
      </div>

      <!-- Live camera feed -->
      <video id="video" autoplay playsinline muted></video>

      <!-- Frozen snapshot after capture -->
      <img id="snapshot" alt="captured frame"/>

      <!-- Animated scan line (visible while live) -->
      <div class="scan-line"></div>

      <!-- Processing spinner (visible while OCR runs) -->
      <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <p>READING CODE…</p>
      </div>

    </div>
    <!-- Corner decorations -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="status" id="status">AWAITING ACTIVATION</div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnStart" onclick="startScanner()">
      <span>▶ Start Scanning</span>
    </button>
    <button class="btn btn-capture" id="btnCapture" onclick="captureAndScan()">
      📷 &nbsp;Done
    </button>
    <button class="btn btn-retry" id="btnRetry" onclick="resetScanner()">
      ↺ &nbsp;Retry
    </button>
  </div>
</div>

<!-- Result modal -->

  <div class="modal">
    <div class="modal-badge" id="modalBadge">CODE</div>
    <div class="modal-title" id="modalTitle"></div>
    <ul class="modal-instructions" id="modalInstructions"></ul>
    <button class="modal-close" onclick="closeModal()">✕ &nbsp; Dismiss</button>

<!-- Tesseract OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  /* ── Hidden code database ── */
  const CODE_DB = {
    "JK56": {
      title: "Jumping Jacks Challenge",
      instructions: [
        "Do jumping jacks every single day.",
        "Complete at least 300 jumping jacks per day.",
        "No rest days — stay consistent!"
      ]
    },
    "XZ11": {
      title: "Push-Up Challenge",
      instructions: [
        "Complete 100 push-ups every day.",
        "Absolutely no skips allowed.",
        "Stay disciplined and track your streak!"
      ]
    }
  };

  /* ── Element refs ── */
  const video             = document.getElementById('video');
  const snapshotImg       = document.getElementById('snapshot');
  const placeholder       = document.getElementById('placeholder');
  const scannerBox        = document.getElementById('scannerBox');
  const scannerWrap       = document.getElementById('scannerWrap');
  const statusEl          = document.getElementById('status');
  const btnStart          = document.getElementById('btnStart');
  const btnCapture        = document.getElementById('btnCapture');
  const btnRetry          = document.getElementById('btnRetry');
  const processingOverlay = document.getElementById('processingOverlay');
  const modalOverlay      = document.getElementById('modalOverlay');

  let stream = null;

  /* ── 1. Open camera ── */
  async function startScanner() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1280 },
          height: { ideal: 720 }
        }
      });

      video.srcObject = stream;
      video.style.display    = 'block';
      placeholder.style.display  = 'none';
      snapshotImg.style.display  = 'none';
      scannerBox.classList.add('scanning');

      btnStart.style.display   = 'none';
      btnCapture.style.display = 'inline-block';
      btnRetry.style.display   = 'none';

      setStatus('POINT AT YOUR CODE — PRESS DONE WHEN READY', 'active');
    } catch (err) {
      setStatus('CAMERA ACCESS DENIED', 'error');
      alert('Please allow camera access in your browser settings and try again.');
    }
  }

  /* ── 2. Capture frame and run OCR ── */
  function captureAndScan() {
    if (!stream) return;

    /* Draw the current video frame onto a hidden canvas */
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    /* Freeze display */
    snapshotImg.src            = canvas.toDataURL('image/png');
    snapshotImg.style.display  = 'block';
    video.style.display        = 'none';
    scannerBox.classList.remove('scanning');

    /* Stop the camera stream */
    stream.getTracks().forEach(t => t.stop());
    stream = null;

    /* Show spinner */
    btnCapture.style.display = 'none';
    processingOverlay.classList.add('show');
    setStatus('READING CODE…', 'processing');

    /* Pre-process for better OCR accuracy:
       greyscale + high contrast + slight brightness boost */
    const proc = document.createElement('canvas');
    proc.width  = canvas.width;
    proc.height = canvas.height;
    const pCtx = proc.getContext('2d');
    pCtx.filter = 'grayscale(1) contrast(3) brightness(1.15)';
    pCtx.drawImage(canvas, 0, 0);

    /* Run Tesseract */
    Tesseract.recognize(proc, 'eng', {
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
      tessedit_pageseg_mode: '11'   /* sparse text — finds isolated strings */
    })
    .then(({ data: { text } }) => {
      processingOverlay.classList.remove('show');

      const cleaned = text.replace(/\s+/g, '').toUpperCase();
      console.log('OCR raw output :', text);
      console.log('OCR cleaned    :', cleaned);

      const match = findCode(cleaned);

      if (match) {
        showPulseRing();
        setStatus('CODE DETECTED: ' + match, 'detected');
        showModal(match);
      } else {
        setStatus('NO CODE FOUND — PLEASE RETRY', 'error');
        btnRetry.style.display = 'inline-block';
      }
    })
    .catch(() => {
      processingOverlay.classList.remove('show');
      setStatus('SCAN FAILED — PLEASE RETRY', 'error');
      btnRetry.style.display = 'inline-block';
    });
  }

  /* ── Code matching with 1-char fuzzy tolerance ── */
  function findCode(text) {
    /* Exact match first */
    for (const code of Object.keys(CODE_DB)) {
      if (text.includes(code)) return code;
    }
    /* Fuzzy: slide a window equal to each code's length, allow 1 diff */
    for (const code of Object.keys(CODE_DB)) {
      for (let i = 0; i <= text.length - code.length; i++) {
        const slice = text.substring(i, i + code.length);
        let diffs = 0;
        for (let j = 0; j < code.length; j++) {
          if (slice[j] !== code[j]) diffs++;
          if (diffs > 1) break;
        }
        if (diffs <= 1) return code;
      }
    }
    return null;
  }

  /* ── Reset back to start ── */
  function resetScanner() {
    snapshotImg.style.display = 'none';
    snapshotImg.src           = '';
    placeholder.style.display = 'flex';
    btnRetry.style.display    = 'none';
    btnStart.style.display    = 'inline-block';
    setStatus('AWAITING ACTIVATION', '');
  }

  /* ── Modal helpers ── */
  function showModal(code) {
    const entry = CODE_DB[code];
    document.getElementById('modalBadge').textContent = code;
    document.getElementById('modalTitle').textContent = entry.title;

    const ul = document.getElementById('modalInstructions');
    ul.innerHTML = '';
    entry.instructions.forEach(line => {
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });

    modalOverlay.classList.add('show');
  }

  function closeModal() {
    modalOverlay.classList.remove('show');
    resetScanner();
  }

  /* Close modal when clicking outside the card */
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) closeModal();
  });

  /* ── Status helper ── */
  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = 'status' + (cls ? ' ' + cls : '');
  }

  /* ── Pulse ring on detection ── */
  function showPulseRing() {
    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    scannerWrap.appendChild(ring);
    setTimeout(() => ring.remove(), 700);
  }
</script>
</body>
</html>
